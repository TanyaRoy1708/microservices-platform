# k8sgpt-config.yaml
apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt-ollama
  namespace: k8sgpt-operator-system
spec:
  ai:
    enabled: true
    model: llama3.2:1b
    backend: localai
    # Ollama runs on the same EC2 as your worker nodes (or a dedicated EC2)
    # It's NOT in the cluster — it's a sidecar on EC2 to avoid memory pressure on pods
    baseUrl: http://172.31.6.242:11434/v1
  noCache: false
  filters:
    - Pod
    - Deployment
    - ReplicaSet
    - Service
    - Ingress
    - HorizontalPodAutoscaler
  sink:
    type: slack
    webhook: YOUR_SLACK_WEBHOOK_URL
  # Scan every 5 minutes
  schedule: "*/5 * * * *"
